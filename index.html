<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부부 경제적 자유 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root { --blue: #3182f6; --bg: #f2f4f6; --text: #191f28; --grey: #8b95a1; --white: #ffffff; }
        body { font-family: "Pretendard", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        .header { margin-bottom: 24px; padding-left: 8px; }
        .header h1 { font-size: 26px; font-weight: 700; margin: 0 0 8px 0; }
        .header p { color: var(--grey); font-size: 15px; margin: 0; }
        .card { background: var(--white); border-radius: 24px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .input-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .input-item { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 13px; color: var(--grey); font-weight: 500; margin-bottom: 8px; }
        input { border: none; background: #f9fafb; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 600; }
        input:focus { outline: 2px solid var(--blue); background: #fff; }
        .btn { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 18px; padding: 18px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn:active { transform: scale(0.98); }
        #resultArea { display: none; margin-top: 20px; }
        .summary-box { background: #f9fafb; border-radius: 16px; padding: 20px; font-size: 16px; line-height: 1.7; }
        .highlight { color: var(--blue); font-weight: 700; }
        .danger { color: #f04452; font-weight: 700; }
        .chart-wrap { position: relative; height: 450px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>경제적 자유 계산기</h1>
        <p>우리 부부의 은퇴 시뮬레이션</p>
    </div>

    <div class="card">
        <h2>기본 정보</h2>
        <div class="input-row">
            <div class="input-item"><label>내 나이</label><input type="number" id="ageS" value="27"></div>
            <div class="input-item"><label>배우자 나이</label><input type="number" id="ageP" value="30"></div>
        </div>
        <div class="input-item" style="margin-bottom:16px;">
            <label>현재 총 자산 (만원)</label>
            <input type="number" id="asset" value="10000" style="width:100%; box-sizing:border-box;">
        </div>
        <div class="input-row">
            <div class="input-item"><label>내 연봉 (만원)</label><input type="number" id="incS" value="4000"></div>
            <div class="input-item"><label>배우자 연봉 (만원)</label><input type="number" id="incP" value="3500"></div>
        </div>
        <div class="input-row">
            <div class="input-item"><label>수익률 (%)</label><input type="number" id="roi" value="8"></div>
            <div class="input-item"><label>연봉상승률 (%)</label><input type="number" id="growth" value="3"></div>
        </div>
        <div class="input-row">
            <div class="input-item"><label>연 지출 (만원)</label><input type="number" id="exp" value="3000"></div>
            <div class="input-item"><label>물가상승률 (%)</label><input type="number" id="inf" value="3"></div>
        </div>
        <div class="input-row">
            <div class="input-item"><label>내 은퇴나이</label><input type="number" id="retS" value="55"></div>
            <div class="input-item"><label>배우자 은퇴나이</label><input type="number" id="retP" value="55"></div>
        </div>
        <div style="height:1px; background:#eee; margin:20px 0;"></div>
        <h2>자녀 정보</h2>
        <div class="input-row">
            <div class="input-item"><label>자녀 수</label><input type="number" id="cC" value="1"></div>
            <div class="input-item"><label>양육 기간(년)</label><input type="number" id="cY" value="20"></div>
        </div>
        <div class="input-item"><label>1인당 연 양육비 (만원)</label><input type="number" id="cE" value="1000"></div>
        
        <button class="btn" onclick="startCalc()">결과 확인하기</button>
    </div>

    <div id="resultArea">
        <div class="card">
            <h2>분석 결과 ✨</h2>
            <div id="sumText" class="summary-box"></div>
        </div>
        <div class="card">
            <h2>자산 흐름 (단위: 억)</h2>
            <div class="chart-wrap">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let myChart = null;

function startCalc() {
    // 1. 입력값 읽기
    const v = (id) => parseFloat(document.getElementById(id).value) || 0;
    
    let aS = v('ageS'), aP = v('ageP'), asset = v('asset');
    let iS = v('incS'), iP = v('incP'), iG = v('growth')/100;
    let roi = v('roi')/100, exp = v('exp'), inf = v('inf')/100;
    let rS = v('retS'), rP = v('retP'), cC = v('cC'), cY = v('cY'), cE = v('cE');

    let labels = [], assetD = [], incD = [], expD = [], childD = [];
    let fire = null, bankrupt = null;
    const maxYear = 100 - aS;

    // 2. 루프 계산
    for (let i = 0; i <= maxYear; i++) {
        let curS = aS + i, curP = aP + i;
        
        let curInc = (curS < rS ? iS * Math.pow(1+iG, i) : 0) + (curP < rP ? iP * Math.pow(1+iG, i) : 0);
        let curExp = exp * Math.pow(1+inf, i);
        let curChild = (i < cY) ? (cC * cE * Math.pow(1+inf, i)) : 0;
        let totalExp = curExp + curChild;

        if (!fire && asset * roi > totalExp && asset > 0) fire = curS;
        asset = asset * (1 + roi) + curInc - totalExp;
        if (!bankrupt && asset < 0) bankrupt = curS;

        labels.push(`${curS}(${curP})`);
        assetD.push(Math.round(asset));
        incD.push(Math.round(curInc));
        expD.push(Math.round(totalExp));
        childD.push(Math.round(curChild));
    }

    // 3. 결과 표시
    document.getElementById('resultArea').style.display = 'block';
    const sumBox = document.getElementById('sumText');
    if (bankrupt) {
        sumBox.innerHTML = `이대로라면 <span class="danger">${bankrupt}세에 자산이 고갈</span>됩니다. 지출 관리나 추가 수익이 필요합니다.`;
    } else if (fire) {
        sumBox.innerHTML = `축하합니다! <span class="highlight">${fire}세에 경제적 자유</span>를 얻습니다. 이후로는 일하지 않아도 자산이 늘어납니다.`;
    } else {
        sumBox.innerHTML = `100세까지 자산이 유지되지만, 완벽한 경제적 자유 시점에는 도달하지 못했습니다.`;
    }

    // 4. 그래프 (왼쪽 단일 축, 억 단위, 굵은 선)
    if (myChart) myChart.destroy();
    const ctx = document.getElementById('mainChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: '순자산', data: assetD, borderColor: '#3182f6', borderWidth: 7, pointRadius: 0, tension: 0.2 },
                { label: '수입', data: incD, borderColor: '#20c997', borderWidth: 3, borderDash: [5,5], pointRadius: 0 },
                { label: '지출', data: expD, borderColor: '#f04452', borderWidth: 3, pointRadius: 0 },
                { label: '자녀지출', data: childD, borderColor: '#ff9800', borderWidth: 2, pointRadius: 0 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(val) {
                            if (val >= 10000) return (val/10000).toFixed(0) + '억';
                            if (val <= -10000) return (val/10000).toFixed(0) + '억';
                            return val.toLocaleString();
                        }
                    },
                    grid: { color: '#f2f4f6' }
                },
                x: {
                    grid: { display: false },
                    ticks: { maxTicksLimit: 8, color: '#8b95a1' }
                }
            },
            plugins: {
                legend: { position: 'top', labels: { usePointStyle: true, font: { weight: '600' } } }
            }
        }
    });

    // 화면 이동
    window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 20, behavior: 'smooth' });
}
</script>

</body>
</html>
