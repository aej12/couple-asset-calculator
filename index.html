<body>

<div class="container">

<header class="main-header">
<h1>부부 FIRE 시뮬레이터</h1>
<p class="subtitle">우리는 몇살에 파이어 할까?</p>
</header>

<main class="card input-card">

<h2 class="section-title">자산 및 수입</h2>

<label>현재 순자산 합계 (만원)
<input type="number" id="assetTotal" value="10000">
</label>

<div class="grid-2">
<label>본인 연 수입 (만원)
<input type="number" id="incomeSelf" value="4500">
</label>

<label>배우자 연 수입 (만원)
<input type="number" id="incomePartner" value="3500">
</label>
</div>

<div class="grid-2">
<label>본인 현재 나이
<input type="number" id="ageSelf" value="30">
</label>

<label>배우자 현재 나이
<input type="number" id="agePartner" value="33">
</label>
</div>

<hr>

<h2 class="section-title">지출</h2>

<label>연간 생활비 합계 (만원)
<input type="number" id="expenseTotal" value="3000">
</label>

<div class="grid-2">
<label>본인 은퇴 나이
<input type="number" id="retireSelf" value="60">
</label>

<label>배우자 은퇴 나이
<input type="number" id="retirePartner" value="60">
</label>
</div>

<hr>

<h2 class="section-title">투자 설정</h2>

<label>연 수익률 (%)
<input type="number" id="interestRate" value="5">
</label>

<div class="grid-2">
<label>소득 상승률 (%)
<input type="number" id="incomeInflation" value="3">
</label>

<label>지출 상승률 (%)
<input type="number" id="expenseInflation" value="2.5">
</label>
</div>

<hr>

<h2 class="section-title">자녀 계획</h2>

<div class="grid-2">
<label>자녀 수
<input type="number" id="childCount" value="1">
</label>

<label>독립까지 남은 기간
<input type="number" id="childYears" value="20">
</label>
</div>

<label>자녀 1인당 연 지출
<input type="number" id="childExpense" value="600">
</label>

<button class="btn-calculate">시뮬레이션 시작</button>

<p class="affiliate-notice">
쿠팡파트너스 활동의 일환으로 소정의 수수료를 지급받을 수 있습니다.
</p>

</main>

<div id="resultArea" class="hidden">

<section class="card">
<h2 id="resultHeadline"></h2>
<div id="summaryText"></div>
</section>

<section class="card">
<div class="chart-wrapper">
<canvas id="assetChart"></canvas>
</div>
</section>

<section class="card">
<div class="chart-wrapper">
<canvas id="expenseChart"></canvas>
</div>
</section>

</div>

</div>
