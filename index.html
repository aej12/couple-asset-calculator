<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>부부 경제적 자유 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>부부 경제적 자유 계산기 💸</h1>
<p class="subtitle">
경제적 자유란 금융소득이 생활비를 초과하는 상태입니다.
</p>
</header>

<section class="card input-section">

<form id="inputForm">

<div class="form-row">
<label>본인 나이
<input type="number" id="ageSelf" value="30">
</label>

<label>배우자 나이
<input type="number" id="agePartner" value="30">
</label>
</div>

<div class="form-row">
<label>현재 자산 합계 (만원)
<input type="number" id="assetTotal" value="10000">
</label>

<label>투자 수익률 (%)
<input type="number" id="interestRate" value="5">
</label>
</div>

<div class="form-row">
<label>본인 연수입
<input type="number" id="incomeSelf" value="5000">
</label>

<label>배우자 연수입
<input type="number" id="incomePartner" value="4000">
</label>
</div>

<div class="form-row">
<label>수입 증가율
<input type="number" id="incomeGrowth" value="3">
</label>

<label>연 지출
<input type="number" id="expenseTotal" value="4000">
</label>

<label>소비 증가율
<input type="number" id="expenseInflation" value="3">
</label>
</div>

<div class="form-row">
<label>본인 은퇴
<input type="number" id="retireSelf" value="60">
</label>

<label>배우자 은퇴
<input type="number" id="retirePartner" value="60">
</label>
</div>

<div class="divider"></div>

<h3>자녀 계획</h3>

<div class="form-row">

<label>자녀 수
<input type="number" id="childCount" value="1">
</label>

<label>독립까지
<input type="number" id="childYearsRemaining" value="20">
</label>

<label>연 자녀지출
<input type="number" id="childAnnualExpense" value="1000">
</label>

</div>

<button type="button" id="calcBtn" class="calculate-btn">
결과 확인하기
</button>

</form>
</section>

<section class="card summary-section" id="summarySection" style="display:none">
<h2>결과 요약</h2>
<div id="summaryText"></div>
</section>

<section class="card result-section" id="resultSection" style="display:none">

<h2>자산 그래프</h2>

<div class="chart-container">
<canvas id="assetChart"></canvas>
</div>

<table>
<thead>
<tr>
<th>나이</th>
<th>순자산</th>
<th>수입</th>
<th>지출</th>
<th>자녀</th>
</tr>
</thead>

<h2>순자산 성장 그래프</h2>
<div class="chart-container">
<canvas id="assetChart"></canvas>
</div>

<h2>수입 / 지출 흐름</h2>
<div class="chart-container">
<canvas id="cashChart"></canvas>
</div>

<tbody id="yearlyTable"></tbody>

</table>

</section>

<script src="script.js"></script>

</body>
</html>
