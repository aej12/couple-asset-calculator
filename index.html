<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PRO 커플 파이어 시뮬레이터</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <header class="main-header">
        <h1>경제적 자유 시뮬레이터 <span>PRO</span></h1>
        <div class="fire-formula-card">

            <p class="formula-sub">순자산이 연간 지출의 25배가 되면 자립이 가능해집니다.</p>
        </div>
        
        <a href="https://blog.naver.com/dowls027" target="_blank" class="toss-banner">
            <div class="toss-banner-icon">💡</div>
            <div class="toss-banner-content">
                <span class="toss-banner-title">더 자세한 재테크 정보</span>
                <span class="toss-banner-desc">작가 A의 블로그 바로가기</span>
            </div>
            <div class="toss-banner-arrow">〉</div>
        </a>
    </header>

    <main class="card input-card">
        <section>
            <h2 class="section-title">기본 정보</h2>
            <div class="form-group">
                <label>현재 순자산 합계 (만원) <input type="number" id="assetTotal" value="10000"></label>
            </div>
            <div class="grid-2">
                <label>본인 연 수입 <input type="number" id="incomeSelf" value="4500"></label>
                <label>배우자 연 수입 <input type="number" id="incomePartner" value="3500"></label>
            </div>
            <div class="grid-2">
                <label>본인 나이 <input type="number" id="ageSelf" value="30"></label>
                <label>배우자 나이 <input type="number" id="agePartner" value="33"></label>
            </div>
        </section>

        <div class="divider"></div>

        <section>
            <h2 class="section-title">은퇴 및 지출</h2>
            <div class="form-group">
                <label>연간 생활비 합계 (만원) <input type="number" id="expenseTotal" value="3000"></label>
            </div>
            <div class="grid-2">
                <label>본인 은퇴 나이 <input type="number" id="retireSelf" value="55"></label>
                <label>배우자 은퇴 나이 <input type="number" id="retirePartner" value="55"></label>
            </div>
        </section>

        <div class="divider"></div>

        <section>
            <h2 class="section-title">투자 및 변수</h2>
            <div class="grid-2">
                <label>투자 수익률 (%) <input type="number" id="interestRate" value="5" step="0.1"></label>
                <label>물가 상승률 (%) <input type="number" id="expenseInflation" value="2.5" step="0.1"></label>
            </div>
        </section>

        <button type="button" class="btn-calculate">시뮬레이션 시작</button>
        <p class="affiliate-notice">쿠팡 파트너스 활동의 일환으로 수수료를 제공받을 수 있습니다.</p>
    </main>

    <div id="resultArea" class="hidden">
        <section class="card result-card">
            <div id="statusIcon" class="status-icon">🚀</div>
            <h2 id="resultHeadline" class="result-headline">분석 결과</h2>
            <div id="summaryText" class="summary-text"></div>
        </section>

        <section class="card chart-card">
            <h3 class="card-subtitle">📈 누적 순자산 성장 추이</h3>
            <div class="chart-container"><canvas id="assetChart"></canvas></div>
        </section>

        <section class="card chart-card">
            <h3 class="card-subtitle">💰 연간 수입 및 지출 균형</h3>
            <div class="chart-container"><canvas id="flowChart"></canvas></div>
        </section>

        <section class="card table-card">
            <h3 class="card-subtitle">연도별 상세 데이터</h3>
            <div class="table-container">
                <table id="resultTable">
                    <thead><tr><th>본인</th><th>배우자</th><th>순자산</th><th>연 소득</th><th>연 지출</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<div id="adModal" class="ad-modal hidden">
    <div class="ad-box">
        <div class="ad-icon">🎁</div>
        <h3>계산기 잠금 해제</h3>
        <p class="ad-text">무료 서비스 유지를 위해<br><strong>쿠팡 방문 후</strong> 결과가 공개됩니다.</p>
        <a href="https://link.coupang.com/a/d2Gw7t" target="_blank" id="coupangLink" class="coupang-btn">쿠팡 방문하기</a>
        <div id="verifyMsg" class="verify-msg">방문 확인 대기 중...</div>
        <button type="button" id="finalRunBtn" class="final-run-btn hidden">결과 확인하기</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
