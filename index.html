<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부부 경제적 자유 계산기</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>부부 경제적 자유 계산기 💸</h1>

<p class="subtitle">
<strong>경제적 자유란?</strong><br>
당신의 금융 소득(이자, 배당금, 임대료 등)이 생활비를 초과하는 상태를 의미합니다.<br>
이 시점부터는 일하지 않아도 생활비를 충당할 수 있게 됩니다.
</p>


<div class="card">

<h2>입력 정보</h2>

<div class="grid">

<label>본인 나이</label>
<input id="ageSelf" type="number">

<label>배우자 나이</label>
<input id="agePartner" type="number">

<label>현재 자산 합계 (만원)</label>
<input id="asset" type="number">

<label>금융자산 증가율 (%)</label>
<input id="returnRate" type="number">

<label>본인 연 수입 (만원)</label>
<input id="incomeSelf" type="number">

<label>배우자 연 수입 (만원)</label>
<input id="incomePartner" type="number">

<label>연 수입 증가율 (%)</label>
<input id="incomeGrowth" type="number">

<label>연 지출 합계 (만원)</label>
<input id="expense" type="number">

<label>연 소비 증가율 (%)</label>
<input id="inflation" type="number">

<label>본인 은퇴 나이</label>
<input id="retireSelf" type="number">

<label>배우자 은퇴 나이</label>
<input id="retirePartner" type="number">

<label>자녀 수</label>
<input id="childCount" type="number">

<label>자녀 독립 나이</label>
<input id="childIndepAge" type="number">

<label>자녀 1인당 연 소비 (만원)</label>
<input id="childCost" type="number">

</div>

<div class="buttonArea">
<button id="calcBtn">계산하기</button>
<button id="shareBtn">결과 공유하기</button>
</div>

</div>


<div id="resultBox" class="card" style="display:none">

<h2>계산 결과</h2>

<p id="summary"></p>

<canvas id="assetChart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
