<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>커플 자산 계산기 - 고급</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>커플 경제적 자유 계산기</h1>

<section>
  <h2>입력 정보</h2>
  <form id="inputForm">
    <label>본인 나이<input type="number" id="ageSelf" value="25" min="0" max="100"></label>
    <label>배우자 나이<input type="number" id="agePartner" value="27" min="0" max="100"></label>
    <label>현재 자산 (만원)<input type="number" id="currentAsset" value="0" min="0"></label>
    <label>월 수입 (만원)<input type="number" id="monthlyIncome" value="200" min="0"></label>
    <label>월 지출 (만원)<input type="number" id="monthlyExpense" value="150" min="0"></label>
    <label>금융자산 증가율 (%)<input type="number" id="interestRate" value="0" step="0.1"></label>
    <button type="submit">계산하기</button>
  </form>
</section>

<section>
  <h2>계산 결과 요약</h2>
  <div id="summary"></div>
</section>

<section>
  <h2>순자산 그래프</h2>
  <canvas id="assetChart" width="800" height="400"></canvas>
</section>

<section>
  <h2>연도별/월별 자산표</h2>
  <table>
    <thead>
      <tr>
        <th>나이</th>
        <th>월</th>
        <th>누적 순자산 (만원)</th>
        <th>월 지출 (만원)</th>
        <th>월 수입 (만원)</th>
      </tr>
    </thead>
    <tbody id="assetTable"></tbody>
  </table>
</section>

<script src="script.js"></script>
</body>
</html>
