<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>경제적 자유(FIRE) 계산기</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>

<h1>경제적 자유(FIRE) 계산기</h1>


<div class="box">

<p class="desc">
계산기에서 파이어(FIRE) 시점은 현재 자산, 소득, 지출, 투자수익률을 기반으로 매년 자산 변화를 시뮬레이션하여
연 지출의 25배(4% 룰)에 도달하면 FIRE 달성 시점으로 계산합니다.
</p>

</div>



<div class="box">

<h2>입력</h2>

<div class="row">

<label>
나이
<small>만 나이 기준으로 입력해주세요</small>
<input type="number" id="age" value="27">
</label>

<label>
은퇴 나이
<input type="number" id="retireAge" value="60">
</label>

</div>


<label>
현재 자산 (만원)

<small>
현재 보유한 총 자산을 입력해주세요.  
퇴직금 포함 금액 입력을 권장합니다.
</small>

<input type="number" id="asset" value="10000">

</label>



<label>
금융자산 상승률 (%)

<small>
전년 대비 금융 총자산 상승률입니다.  
예적금 투자 2~3% / 지수투자 및 주식투자 4~10% 권장
</small>

<input type="number" id="returnRate" value="5">

</label>



<div class="row">

<label>
연 소득 (만원)
<input type="number" id="income" value="4200">
</label>


<label>
근로소득 증가율 (%)
<input type="number" id="incomeGrowth" value="5">
</label>

</div>



<div class="row">

<label>
연 지출 (만원)
<input type="number" id="expense" value="3000">
</label>


<label>
지출 상승률 (%)
<input type="number" id="inflation" value="3">
</label>

</div>



<button onclick="calculate()">계산하기</button>

</div>



<div class="box">

<h2>계산 결과</h2>

<div id="result"></div>

</div>



<div class="box">

<canvas id="chart"></canvas>

</div>



</body>

<script src="script.js"></script>

</html>
