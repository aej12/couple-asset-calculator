<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>부부 경제적 자유 계산기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <h1>부부 경제적 자유 계산기 💸</h1>
    <p class="subtitle">금융 소득이 생활비를 초과하는 순간이 진정한 자유입니다.</p>
  </header>

  <section class="card input-section">
    <h2>입력 정보</h2>
    <form id="inputForm">
      <div class="form-row">
        <label>본인 나이<input type="number" id="ageSelf" value="27" min="0"></label>
        <label>배우자 나이<input type="number" id="agePartner" value="30" min="0"></label>
      </div>
      <div class="form-row">
        <label>현재 자산 (만원)<input type="number" id="assetTotal" value="10000"></label>
        <label>금융자산 증가율 (%)<input type="number" id="interestRate" value="8" step="0.1"></label>
      </div>
      <div class="form-row">
        <label>본인 연 수입 (만원)<input type="number" id="incomeSelf" value="4200"></label>
        <label>배우자 연 수입 (만원)<input type="number" id="incomePartner" value="3500"></label>
      </div>
      <div class="form-row">
        <label>연 수입 증가율 (%)<input type="number" id="incomeGrowth" value="3" step="0.1"></label>
        <label>연 소비 증가율 (%)<input type="number" id="expenseInflation" value="3" step="0.1"></label>
      </div>
      <div class="form-row">
        <label>기본 연 지출 (만원)<input type="number" id="expenseTotal" value="3000"></label>
        <label>본인 은퇴 나이<input type="number" id="retireSelf" value="55"></label>
        <label>배우자 은퇴 나이<input type="number" id="retirePartner" value="55"></label>
      </div>
      <div class="divider"></div>
      <div class="form-row">
        <label>자녀 수<input type="number" id="childCount" value="1"></label>
        <label>독립까지 남은 기간 (년)<input type="number" id="childYearsRemaining" value="20"></label>
        <label>자녀 1인 연 소비 (만원)<input type="number" id="childAnnualExpense" value="1000"></label>
      </div>
      <button type="button" class="calculate-btn">계산 및 그래프 생성</button>
    </form>
  </section>

  <section class="card summary-section" id="summarySection" style="display: none;">
    <h2>계산 결과 요약</h2>
    <div id="summaryText" class="summary-text"></div>
  </section>

  <section class="card result-section" id="resultSection" style="display: none;">
    <h2>연 단위 자산 흐름 그래프</h2>
    <div class="chart-container">
      <canvas id="assetChart"></canvas>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>나이(본인/배우자)</th>
            <th>순자산</th>
            <th>총 수입</th>
            <th>총 지출</th>
          </tr>
        </thead>
        <tbody id="yearlyTable"></tbody>
      </table>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
