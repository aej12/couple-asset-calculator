<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>부부 경제적 자유 계산기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <h1>부부 경제적 자유 계산기 💸</h1>
    <p class="subtitle">
      <strong>경제적 자유란?</strong><br>
      당신의 금융 소득(이자, 배당금 등)이 생활비를 초과하는 상태를 의미합니다.<br>
      이 시점부터는 일하지 않아도 자산이 스스로 돈을 벌어옵니다.
    </p>
  </header>

  <section class="card input-section">
    <h2>기본 정보 입력</h2>
    <form id="inputForm">
      <div class="form-row">
        <label>본인 나이<input type="number" id="ageSelf" value="30" min="0" max="100"></label>
        <label>배우자 나이<input type="number" id="agePartner" value="30" min="0" max="100"></label>
      </div>
      <div class="form-row">
        <label>현재 자산 합계 (만원)<input type="number" id="assetTotal" value="10000" min="0"></label>
        <label>금융자산 증가율 (%)<input type="number" id="interestRate" value="5" step="0.1"></label>
      </div>
      <div class="form-row">
        <label>본인 연 수입 (만원)<input type="number" id="incomeSelf" value="5000" min="0"></label>
        <label>배우자 연 수입 (만원)<input type="number" id="incomePartner" value="4000" min="0"></label>
      </div>
      <div class="form-row">
        <label>연 수입 증가율 (%)<input type="number" id="incomeGrowth" value="3" step="0.1"></label>
        <label>연 지출 합계 (만원)<input type="number" id="expenseTotal" value="4000" min="0"></label>
        <label>연 소비 증가율 (%)<input type="number" id="expenseInflation" value="3" step="0.1"></label>
      </div>
      <div class="form-row">
        <label>본인 은퇴 나이<input type="number" id="retireSelf" value="60" min="0" max="100"></label>
        <label>배우자 은퇴 나이<input type="number" id="retirePartner" value="60" min="0" max="100"></label>
      </div>
      
      <div class="divider"></div>
      <h3>자녀 계획</h3>
      <div class="form-row">
        <label>자녀 수 (명)<input type="number" id="childCount" value="1" min="0"></label>
        <label>자녀 독립까지 남은 기간 (년)<input type="number" id="childYearsRemaining" value="20" min="0" max="100"></label>
        <label>자녀 1인 연 소비 (만원)<input type="number" id="childAnnualExpense" value="1000" min="0"></label>
      </div>
      <button type="button" class="calculate-btn">결과 확인하기</button>
    </form>
  </section>

  <section class="card summary-section" id="summarySection" style="display: none;">
    <h2>계산 결과 요약 ✨</h2>
    <div id="summaryText" class="summary-text"></div>
  </section>

  <section class="card result-section" id="resultSection" style="display: none;">
    <h2>연 단위 자산 흐름 그래프</h2>
    <div class="chart-container">
      <canvas id="assetChart"></canvas>
    </div>
    
    <h3 class="table-title">연 단위 상세 요약표</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>본인(배우자) 나이</th>
            <th>누적 순자산</th>
            <th>총 연 수입</th>
            <th>기본 연 지출</th>
            <th>자녀 연 지출</th>
          </tr>
        </thead>
        <tbody id="yearlyTable"></tbody>
      </table>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
