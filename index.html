<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>커플 자산 계산기 - 최종판</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>커플 경제적 자유 계산기</h1>

<section class="input-section">
  <h2>입력 정보</h2>
  <form id="inputForm">
    <div class="form-row">
      <label>본인 나이<input type="number" id="ageSelf" value="25" min="0" max="100"></label>
      <label>배우자 나이<input type="number" id="agePartner" value="27" min="0" max="100"></label>
    </div>
    <div class="form-row">
      <label>현재 자산 합계 (만원)<input type="number" id="assetTotal" value="0" min="0"></label>
      <label>본인 월 수입 (만원)<input type="number" id="incomeSelf" value="200" min="0"></label>
      <label>배우자 월 수입 (만원)<input type="number" id="incomePartner" value="150" min="0"></label>
    </div>
    <div class="form-row">
      <label>월 지출 합계 (만원)<input type="number" id="expenseTotal" value="270" min="0"></label>
      <label>금융자산 증가율 (%)<input type="number" id="interestRate" value="0" step="0.1"></label>
    </div>
    <div class="form-row">
      <label>본인 은퇴 나이<input type="number" id="retireSelf" value="60" min="0" max="100"></label>
      <label>배우자 은퇴 나이<input type="number" id="retirePartner" value="60" min="0" max="100"></label>
    </div>
    <button type="submit" class="calculate-btn">계산하기</button>
  </form>
</section>

<section class="summary-section">
  <h2>계산 결과 요약</h2>
  <div id="summary"></div>
</section>

<section class="result-section">
  <div class="tabs">
    <button class="tablink active" data-tab="monthly">월별 상세</button>
    <button class="tablink" data-tab="yearly">연 단위 요약</button>
  </div>

  <div class="tabcontent" id="monthly">
    <h2>누적 순자산 그래프</h2>
    <canvas id="assetChart" width="800" height="400"></canvas>
    <h3>월별 상세표</h3>
    <table>
      <thead>
        <tr>
          <th>나이</th><th>월</th><th>누적 순자산 (만원)</th><th>월 지출 (만원)</th><th>월 수입 (만원)</th>
        </tr>
      </thead>
      <tbody id="assetTable"></tbody>
    </table>
  </div>

  <div class="tabcontent" id="yearly" style="display:none;">
    <h3>연 단위 요약표</h3>
    <table>
      <thead>
        <tr>
          <th>나이</th><th>연 누적 순자산 (만원)</th><th>연 소비 (만원)</th><th>연 수입 (만원)</th>
        </tr>
      </thead>
      <tbody id="yearlyTable"></tbody>
    </table>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
