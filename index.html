<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부부 경제적 자유 계산기</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>부부 경제적 자유 계산기 💸</h1>

<p class="subtitle">
<strong>경제적 자유란?</strong><br>
금융 소득(이자, 배당금, 임대료 등)이 생활비를 초과하는 상태입니다.
</p>


<div class="card">

<h2>기본 정보 입력</h2>

<div class="form-grid">

<div class="field">
<label>본인 나이</label>
<input id="ageSelf" type="number">
</div>

<div class="field">
<label>배우자 나이</label>
<input id="agePartner" type="number">
</div>

<div class="field">
<label>현재 자산 합계 (만원)</label>
<input id="asset">
</div>

<div class="field">
<label>금융자산 증가율 (%)</label>
<input id="rate">
</div>

<div class="field">
<label>본인 연 수입 (만원)</label>
<input id="incomeSelf">
</div>

<div class="field">
<label>배우자 연 수입 (만원)</label>
<input id="incomePartner">
</div>

<div class="field">
<label>연 수입 증가율 (%)</label>
<input id="incomeGrowth">
</div>

<div class="field">
<label>연 지출 합계 (만원)</label>
<input id="expense">
</div>

<div class="field">
<label>연 소비 증가율 (%)</label>
<input id="inflation">
</div>

<div class="field">
<label>본인 은퇴 나이</label>
<input id="retireSelf">
</div>

<div class="field">
<label>배우자 은퇴 나이</label>
<input id="retirePartner">
</div>

<div class="field">
<label>자녀 수</label>
<input id="childCount">
</div>

<div class="field">
<label>자녀 독립 나이</label>
<input id="childIndep">
</div>

<div class="field">
<label>자녀 1인당 연 소비 (만원)</label>
<input id="childCost">
</div>

</div>

<div class="buttonBox">
<button id="calcBtn">계산하기</button>
</div>

</div>


<div id="resultBox" class="card" style="display:none">

<h2>계산 결과</h2>

<p id="resultText"></p>

<canvas id="assetChart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
