<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>경제적 자유 계산기</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>경제적 자유 계산기</h1>

<p class="desc">
본 계산기는 현재 자산·소득·지출을 기반으로 매년 자산 변화를 시뮬레이션합니다.<br>
FIRE 시점은 <b>금융소득이 근로소득의 1.5배가 되는 시점</b>으로 계산됩니다.
</p>

<div class="card">

<h2>기본 정보 입력</h2>

<label>현재 나이 (만 나이)</label>
<input type="number" id="age" value="27">

<label>현재 자산 (퇴직금 포함)</label>
<input type="number" id="asset" value="50000000">

<label>현재 월 소득</label>
<input type="number" id="income" value="3000000">

<label>현재 월 지출</label>
<input type="number" id="expense" value="1500000">

<label>근로소득 증가율 (%)</label>
<input type="number" id="incomeGrowth" value="5">

<label>지출 상승률 (%)</label>
<input type="number" id="expenseGrowth" value="3">

<label>금융자산 상승률 (%)</label>
<input type="number" id="returnRate" value="5">

<p class="guide">
금융자산 상승률은 전년 대비 금융자산 증가율입니다.<br>
예적금 위주: 2~3% / 지수투자 및 주식투자: 4~10%
</p>

<button id="calcBtn">계산하기</button>

</div>

<div class="card">

<h2>계산 결과</h2>

<div id="resultText"></div>

<canvas id="assetChart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
