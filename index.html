<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>커플 자산 계산기 - 연 단위 최종판</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>부부 경제적 자유 계산기 (연 단위)</h1>

<section class="input-section">
  <h2>입력 정보</h2>
  <form id="inputForm">
    <div class="form-row">
      <label>본인 나이<input type="number" id="ageSelf" value="27" min="0" max="100"></label>
      <label>배우자 나이<input type="number" id="agePartner" value="30" min="0" max="100"></label>
    </div>
    <div class="form-row">
      <label>현재 자산 합계 (만원)<input type="number" id="assetTotal" value="10000" min="0"></label>
      <label>본인 연 수입 (만원)<input type="number" id="incomeSelf" value="4200" min="0"></label>
      <label>배우자 연 수입 (만원)<input type="number" id="incomePartner" value="2800" min="0"></label>
    </div>
    <div class="form-row">
      <label>연 지출 합계 (만원)<input type="number" id="expenseTotal" value="3000" min="0"></label>
      <label>금융자산 증가율 (%)<input type="number" id="interestRate" value="3" step="0.1"></label>
      <label>연 소비 증가율 (%)<input type="number" id="expenseInflation" value="5" step="0.1"></label>
    </div>
    <div class="form-row">
      <label>본인 은퇴 나이<input type="number" id="retireSelf" value="60" min="0" max="100"></label>
      <label>배우자 은퇴 나이<input type="number" id="retirePartner" value="60" min="0" max="100"></label>
      <label>연 수입 증가율 (%)<input type="number" id="incomeInflation" value="3" step="0.1"></label>
    </div>
    <div class="form-row">
      <label>자녀 수<input type="number" id="childCount" value="1" min="0"></label>
      <label>자녀 독립 나이<input type="number" id="childIndependenceAge" value="20" min="0" max="100"></label>
      <label>자녀 1인당 연 소비 (만원)<input type="number" id="childAnnualExpense" value="500" min="0"></label>
    </div>
    <button type="button" class="calculate-btn">계산하기</button>
  </form>
</section>

<section class="summary-section">
  <h2>계산 결과 요약</h2>
  <div id="summary"></div>
  <p class="note">
    ※ 연 지출(expenseTotal)은 기본 가계 지출 + 자녀 지출을 합친 값이며, 매년 연 소비 증가율을 적용합니다.  
    자녀가 독립하면 그때부터 자녀 지출만 제외되며, 독립 전 자녀 지출도 매년 상승률이 적용됩니다.
  </p>
</section>

<section class="result-section">
  <h2>연 단위 누적 순자산 & 자녀 독립 후 지출 감소 금액 그래프</h2>
  <canvas id="assetChart" width="800" height="400"></canvas>
  <h3>연 단위 요약표</h3>
  <table>
    <thead>
      <tr>
        <th>본인 나이</th><th>배우자 나이</th><th>누적 순자산 (만원)</th><th>연 수입 (만원)</th><th>연 지출 (만원)</th><th>자녀 지출 감소 (만원)</th>
      </tr>
    </thead>
    <tbody id="yearlyTable"></tbody>
  </table>
</section>

<script src="script.js"></script>
</body>
</html>
