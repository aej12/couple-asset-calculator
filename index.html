<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>부부 FIRE 시뮬레이터</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <header class="main-header">
    <h1>부부 FIRE 시뮬레이터</h1>
    <p class="subtitle">우리는 몇살에 파이어 할까?</p>
    
    <a href="https://blog.naver.com/dowls027" target="_blank" class="toss-banner">
      <div class="toss-banner-icon">💡</div>
      <div class="toss-banner-content">
        <span class="toss-banner-title">더 자세한 경제정보는 블로그 참조</span>
        <span class="toss-banner-desc">blog.naver.com/dowls027</span>
      </div>
      <div class="toss-banner-arrow">〉</div>
    </a>
  </header>

  <main class="card">
    <section class="input-section">
      <h2 class="section-title">자산 및 수입</h2>
      <div class="form-group">
        <label>현재 순자산 합계 (만원)</label>
        <span class="tooltip">현금, 주식, 채권 등 (부동산 제외)</span>
        <input type="number" id="assetTotal" value="10000">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>본인 연 수입 (만원)</label>
          <input type="number" id="incomeSelf" value="4500">
        </div>
        <div class="form-group">
          <label>배우자 연 수입 (만원)</label>
          <input type="number" id="incomePartner" value="3500">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>본인 나이</label>
          <input type="number" id="ageSelf" value="30">
        </div>
        <div class="form-group">
          <label>배우자 나이</label>
          <input type="number" id="agePartner" value="33">
        </div>
      </div>

      <div class="divider"></div>

      <h2 class="section-title">지출 및 은퇴 설정</h2>
      <div class="form-group">
        <label>연간 생활비 합계 (만원)</label>
        <input type="number" id="expenseTotal" value="3000">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>본인 은퇴 나이</label>
          <input type="number" id="retireSelf" value="60">
        </div>
        <div class="form-group">
          <label>배우자 은퇴 나이</label>
          <input type="number" id="retirePartner" value="60">
        </div>
      </div>

      <div class="divider"></div>

      <h2 class="section-title">수익률 및 자녀</h2>
      <div class="grid-2">
        <div class="form-group">
          <label>투자 수익률 (%)</label>
          <input type="number" id="interestRate" value="5" step="0.1">
        </div>
        <div class="form-group">
          <label>지출 상승률 (%)</label>
          <input type="number" id="expenseInflation" value="2.5" step="0.1">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>자녀 수 (명)</label>
          <input type="number" id="childCount" value="1">
        </div>
        <div class="form-group">
          <label>독립 기간 (년)</label>
          <input type="number" id="childYears" value="20">
        </div>
      </div>
    </section>

    <div class="action-area">
      <button type="button" id="mainBtn" class="btn-toss-primary">시뮬레이션 시작</button>
      <p class="ad-notice">쿠팡 파트너스 활동을 통해 소정의 수수료를 지원받습니다.</p>
    </div>
  </main>

  <div id="resultArea" class="hidden">
    <section class="card result-summary">
      <div id="statusIcon" class="status-icon">🚀</div>
      <h2 id="resultHeadline">분석 결과</h2>
      <div id="summaryText" class="summary-box"></div>
    </section>

    <section class="card chart-card">
      <h3 class="card-subtitle">자산 추이</h3>
      <div class="chart-wrapper"><canvas id="assetChart"></canvas></div>
    </section>

    <section class="card chart-card">
      <h3 class="card-subtitle">수입 및 지출</h3>
      <div class="chart-wrapper"><canvas id="expenseChart"></canvas></div>
    </section>

    <section class="card table-card">
      <div class="table-container">
        <table id="resultTable">
          <thead>
            <tr><th>나이</th><th>총자산(일반)</th><th>총자산(FIRE)</th><th>수입</th><th>지출</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <footer class="main-footer">
    <div class="visitor-footer">
      <span>오늘 <strong><span id="todayCount">0</span></strong></span>
      <span class="v-divider">|</span>
      <span>전체 <strong><span id="totalCount">0</span></strong></span>
    </div>
  </footer>
</div>

<script src="script.js"></script>
</body>
</html>
