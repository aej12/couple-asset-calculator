<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>커플 자산 계산기 - 고급</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h1>커플 경제적 자유 계산기</h1>

<section id="summarySection">
  <h2>계산 결과 요약</h2>
  <div id="summary"></div>
</section>

<section id="chartSection">
  <h2>순자산 그래프</h2>
  <canvas id="assetChart" width="800" height="400"></canvas>
</section>

<section id="tableSection">
  <h2>연도별/월별 자산표</h2>
  <table>
    <thead>
      <tr>
        <th>나이</th>
        <th>월</th>
        <th>누적 순자산 (만원)</th>
        <th>월 소비 (만원)</th>
        <th>월 수입 (만원)</th>
      </tr>
    </thead>
    <tbody id="assetTable"></tbody>
  </table>
</section>

<script src="script.js"></script>
</body>
</html>
